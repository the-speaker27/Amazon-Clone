<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Sign Up</title>

    <style>
        .container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 50vh;
        }


        .signup-box {
            background: white;
            width: 320px;
            padding: 25px;
            border-radius: 8px;
            border: 1px solid #ddd;
        }


        .signup-box h2 {
            margin-bottom: 15px;
            font-weight: normal;
        }

        label {
            display: block;
            font-size: 13px;
            font-weight: bold;
            margin-top: 10px;
        }

        input {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            border: 1px solid #a6a6a6;
            border-radius: 4px;
            outline: none;
        }


        .signup-btn {
            width: 100%;
            margin-top: 15px;
            padding: 10px;
            background: #ffd814;
            border: 1px solid #fcd200;
            border-radius: 20px;
            cursor: pointer;
        }

        .signup-btn:hover {
            background: #f7ca00;
        }

        .login-text {
            font-size: 12px;
            margin-top: 15px;
        }

        .login-text a {
            color: #0066c0;
            text-decoration: none;
        }

        .logo {
            display: flex;
            justify-content: center;
            margin-top: 30px;
        }

        .logo img {
            width: 200px;
        }
    </style>
</head>

<body>

    <div class="logo">
        <img src="img/im2.png" alt="logo">
    </div>
    <div class="container">
        <div class="signup-box">
            <h2>Create Account</h2>

            <label for="name">Your name</label>
            <input type="text" id="name" placeholder="First and last name">

            <label for="mob">Mobile number</label>
            <input type="tel" id="mob" placeholder="10-digit mobile number">

            <button class="signup-btn">Continue</button>

            <p class="login-text">
                Already have an account?
                <a href="sign.html">Sign in</a>
            </p>
        </div>
    </div>

</body>

</html>
